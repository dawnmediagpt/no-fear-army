[build]
  publish = "dist"
  functions = "netlify/functions"

# The Entrepreneur's Detox — SPA fallback for the /detox route only.
# Root (the live Fear Detox) is untouched.
[[redirects]]
  from = "/detox"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/detox/*"
  to = "/index.html"
  status = 200
